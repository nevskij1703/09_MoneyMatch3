<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Money Match 3</title>
    <!--
      Шрифты самохостятся из public/fonts/ (Figma-макет: Nunito + Fredoka).
      @font-face живёт здесь (не в styles.css), чтобы url() резолвился
      относительно index.html — так пути работают и в dev, и в dist/ при
      base:'./' (WebView/APK без сети).
    -->
    <style>
      @font-face {
        font-family: 'Nunito';
        font-weight: 700;
        font-style: normal;
        font-display: swap;
        src: url('fonts/nunito-700-latin.woff2') format('woff2');
        unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
      }
      @font-face {
        font-family: 'Nunito';
        font-weight: 700;
        font-style: normal;
        font-display: swap;
        src: url('fonts/nunito-700-cyrillic.woff2') format('woff2');
        unicode-range: U+0301, U+0400-045F, U+0490-0491, U+04B0-04B1, U+2116;
      }
      @font-face {
        font-family: 'Nunito';
        font-weight: 800;
        font-style: normal;
        font-display: swap;
        src: url('fonts/nunito-800-latin.woff2') format('woff2');
        unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
      }
      @font-face {
        font-family: 'Nunito';
        font-weight: 800;
        font-style: normal;
        font-display: swap;
        src: url('fonts/nunito-800-cyrillic.woff2') format('woff2');
        unicode-range: U+0301, U+0400-045F, U+0490-0491, U+04B0-04B1, U+2116;
      }
      @font-face {
        font-family: 'Nunito';
        font-weight: 900;
        font-style: normal;
        font-display: swap;
        src: url('fonts/nunito-900-latin.woff2') format('woff2');
        unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
      }
      @font-face {
        font-family: 'Nunito';
        font-weight: 900;
        font-style: normal;
        font-display: swap;
        src: url('fonts/nunito-900-cyrillic.woff2') format('woff2');
        unicode-range: U+0301, U+0400-045F, U+0490-0491, U+04B0-04B1, U+2116;
      }
      @font-face {
        font-family: 'Fredoka';
        font-weight: 600;
        font-style: normal;
        font-display: swap;
        src: url('fonts/fredoka-600-latin.woff2') format('woff2');
      }
      @font-face {
        font-family: 'Fredoka';
        font-weight: 700;
        font-style: normal;
        font-display: swap;
        src: url('fonts/fredoka-700-latin.woff2') format('woff2');
      }
    </style>
  </head>
  <body>
    <!--
      #viewport — заполняет экран, центрирует #stage.
      #stage — фиксированное «дизайн-разрешение» 390×844 (координаты Figma-макета
      «Play window» 1-в-1). GameApp масштабирует #stage через transform:scale (FIT).
      Все DOM-вью позиционируются абсолютно внутри #stage в координатах 390×844.
    -->
    <div id="viewport">
      <div id="stage"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
